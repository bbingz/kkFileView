name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v1.0.0, v2.1.3 etc.

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Extract Branch/Tag Name
      id: extract_name
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          server/target/*.zip
          server/target/*.tar.gz
          server/target/*.jar
        name: Release ${{ env.TAG_NAME }}
        body: |
          Automated release for version ${{ env.TAG_NAME }}
          
          ### 🔒 Security Patches included
          - Re-implemented File Validation via Strict Whitelist
          - Rectified SSRF, RCE, CSRF, and XSS issues
          - Hardened File / /directory routes
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
